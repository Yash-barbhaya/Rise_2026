<!DOCTYPE html>
<html lang="en">
<head>
    <title>Order System</title>
    <script src="Assignment3.js" defer></script>
</head>
<body>

    <label>Order ID</label>
    <input type="text" id="orderid">

    <label>Order Amount</label>
    <input type="number" id="orderamount">

    <label>Order Quantity</label>
    <input type="number" id="orderquantity">

    <button id="addorder">Add Order</button>
    <br><br>

    <table border="2">
        <tr>
            <th>ID</th>
            <th>Amount</th>
            <th>Qty</th>
        </tr>
        <tbody id="tableBody"></tbody>
    </table>

    <p id="totalRevenueOut"></p>
    <p id="totalQuantityOut"></p>

    <button id="result">Show Results</button>

</body>
</html>
